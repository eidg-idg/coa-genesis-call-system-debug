<!-- memberVerificationModal.html -->
<template>
    <div class="host-container">
        <lightning-card title="Verify Member" icon-name="custom:custom14">
            <div class="interaction-name-display slds-m-around_medium slds-align_absolute-center">
                <p><b>Interaction:</b> {interactionName}</p>
            </div>

            <div class="slds-m-around_medium">
                <!-- Conditionally render dropdowns -->
                <template if:true={showDropdowns}>
                    <lightning-combobox name="caseOrigin"
                                        label="Case Origin"
                                        value={caseOriginValue}
                                        options={caseOriginOptions}
                                        onchange={handleCaseOriginChange}>
                    </lightning-combobox>

                    <template if:true={isPhoneOrigin}>
                        <lightning-combobox name="memberType"
                                            label="Member Type"
                                            value={memberTypeValue}
                                            options={memberTypeOptions}
                                            onchange={handleMemberTypeChange}>
                        </lightning-combobox>
                    </template>

                    <template if:true={showPhaseOneVerify}>
                        <div class="slds-grid slds-grid_align-center slds-m-top_medium">
                            <lightning-button label="Verify" variant="brand"
                                              icon-name="utility:check"
                                              onclick={verifyPhaseOne}
                                              disabled={isSaving}>
                            </lightning-button>
                        </div>
                    </template>
                </template>

                <!-- Verification Section, shown after dropdown selections are made -->
                <template if:true={showVerificationSection}>
                    <div class="slds-grid slds-wrap">
                        <!-- Left Column for Checkboxes -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                            <template for:each={verificationOptionsWithDisabled} for:item="option">
                                <div key={option.value} class="slds-grid slds-align-center custom-checkbox-row">
                                    <!-- Flex container for asterisk and checkbox -->
                                    <div class="flex-container">
                                        <!-- Conditionally render asterisk only when required -->
                                        <template if:true={option.showAsterisk}>
                                            <span class="required-asterisk" aria-hidden="true">*</span>
                                        </template>
                                        <!-- Placeholder for alignment if no asterisk is required -->
                                        <template if:false={option.showAsterisk}>
                                            <span class="asterisk-placeholder" aria-hidden="true"> </span>
                                        </template>
                                        <lightning-input type="checkbox"
                                                        label={option.label}
                                                        name={option.value}
                                                        disabled={option.disabled}
                                                        onchange={handleChange}
                                                        class="checkbox-input"></lightning-input>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <!-- Right Column for Data Fields -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                            <p><b>Member Id:</b> {account.MemberID}</p>
                            <p><b>SSN:</b> {account.ssn}</p>
                            <p><b>Member Name:</b> {account.Name}</p>
                            <p><b>DOB:</b> {formattedDateOfBirth}</p>
                            <p><b>Phone:</b> {formattedPhoneNumber}</p>
                            <div>
                                <p><b>Mailing Address:</b></p>
                                <pre>{fullMailingAddress}</pre>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Caller Information - always visible during verification -->
                <template if:true={showVerificationSection}>
                    <div class="slds-m-around_medium">
                        <lightning-input label="Caller Name"
                                         name="callerName"
                                         value={nameValue}
                                         required
                                         onchange={handleNameChange}>
                        </lightning-input>

                        <lightning-input label="Caller Phone"
                                         name="callerPhone"
                                         value={callerPhoneValue}
                                         onchange={handleCallerPhoneChange}>
                        </lightning-input>
                    </div>
                </template>

                <!-- Representative Details Section -->
                <template if:true={showRepresentativeDetails}>
                    <div class="slds-m-around_medium">
                        <lightning-combobox name="representativeType"
                                            label="Representative Type"
                                            value={representativeTypeValue}
                                            options={representativeTypeOptions}
                                            onchange={handleRepresentativeTypeChange}>
                        </lightning-combobox>
                    </div>

                    <!-- Relationship Type Dropdown, shown for Personal Representative -->
                    <template if:true={showRelationshipType}>
                        <div class="slds-m-around_medium">
                            <lightning-combobox name="relationshipType"
                                                label="Relationship Type"
                                                value={relationshipTypeValue}
                                                options={relationshipTypeOptions}
                                                onchange={handleRelationshipTypeChange}>
                            </lightning-combobox>
                        </div>
                    </template>
                </template>

                <!-- Legal Representative — disabled lookup (A-12) -->
                <template if:true={isLegalRepresentative}>
                    <div class="slds-m-around_medium">
                        <lightning-combobox name="legalRepName"
                                            label="Name"
                                            placeholder="Select Name"
                                            disabled
                                            field-level-help="No authorized representative records on file for this member.">
                        </lightning-combobox>
                    </div>
                </template>

                <!-- Parent Relationship — disabled lookup + Auth Type -->
                <template if:true={isParentRelationship}>
                    <div class="slds-m-around_medium">
                        <lightning-combobox name="parentLookup"
                                            label="Parent"
                                            placeholder="Select Name"
                                            disabled
                                            field-level-help="No authorized parent records on file for this member.">
                        </lightning-combobox>
                        <lightning-input label="Auth Type"
                                        value="Personal Representative"
                                        read-only
                                        class="slds-m-top_small">
                        </lightning-input>
                    </div>
                </template>

                <!-- Non-Parent Personal Rep — full field set -->
                <template if:true={isNonParentPersonalRep}>
                    <div class="slds-m-around_medium">
                        <lightning-input label="Name"
                                        name="repName"
                                        value={repNameValue}
                                        required
                                        onchange={handleRepNameChange}>
                        </lightning-input>
                        <lightning-input label="Caller Phone"
                                        name="repCallerPhone"
                                        value={repCallerPhoneValue}
                                        required
                                        onchange={handleRepCallerPhoneChange}>
                        </lightning-input>
                        <lightning-textarea label="Description"
                                            name="description"
                                            value={descriptionValue}
                                            onchange={handleDescriptionChange}
                                            rows="3">
                        </lightning-textarea>
                        <lightning-input label="Auth Type"
                                        value="Personal Representative"
                                        read-only
                                        class="slds-m-top_small">
                        </lightning-input>
                        <lightning-input label="Start Date"
                                        value={todayDateString}
                                        read-only
                                        class="slds-m-top_small">
                        </lightning-input>
                        <lightning-input type="date"
                                        label="End Date"
                                        name="endDate"
                                        value={endDateValue}
                                        onchange={handleEndDateChange}
                                        class="slds-m-top_small">
                        </lightning-input>
                    </div>
                </template>

                <!-- Error message display -->
                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-around_medium" role="alert">
                        <span>{errorMessage}</span>
                    </div>
                </template>

                <!-- Center the button at the bottom -->
                <div class="slds-grid slds-grid_align-center slds-m-top_medium">
                    <lightning-button label={verifyButtonLabel} variant="brand" onclick={verify} disabled={isSaving}></lightning-button>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
