<template>
    <div class="host-container">
        <lightning-card>
            <!-- Interaction Number Display -->
            <template if:true={interactionName}>
                <div class="interaction-name-display slds-m-around_medium slds-align_absolute-center">
                    <p><b>Interaction Number is:</b> {interactionName}</p>
                </div>
            </template>

            <div class="content-area">
                <!-- Case Origin Dropdown -->
                <div class="field-row slds-m-bottom_medium">
                    <span class="field-label"><abbr class="slds-required" title="required">*</abbr>Case Origin</span>
                    <div class="field-control">
                        <lightning-combobox name="caseOrigin"
                                            label="Case Origin"
                                            value={caseOriginValue}
                                            options={caseOriginOptions}
                                            required
                                            variant="label-hidden"
                                            data-validate
                                            onchange={handleCaseOriginChange}>
                        </lightning-combobox>
                    </div>
                </div>

                <!-- Phone-origin: full verification flow -->
                <template if:true={isPhoneOrigin}>
                    <!-- Verification Section -->
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                            <!-- Provider Verification Options, including checkboxes with conditional asterisk -->
                            <template for:each={verificationOptionsWithDisabled} for:item="option">
                                <div key={option.value} class="slds-grid slds-align-center custom-checkbox-row">
                                    <div class="flex-container">
                                        <!-- Render asterisk if required -->
                                        <template if:true={option.showAsterisk}>
                                            <span class="required-asterisk" aria-hidden="true">*</span>
                                        </template>
                                        <!-- Placeholder if no asterisk required -->
                                        <template if:false={option.showAsterisk}>
                                            <span class="asterisk-placeholder" aria-hidden="true"></span>
                                        </template>
                                        <lightning-input type="checkbox"
                                                         label={option.label}
                                                         name={option.value}
                                                         disabled={option.disabled}
                                                         onchange={handleChange}
                                                         class="checkbox-input"></lightning-input>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Provider Information Display — order matches checkbox column -->
                        <div class="slds-col slds-size_1-of-2 slds-p-horizontal_small">
                            <p class="data-value">{healthcareProvider.Name}</p>
                            <p class="data-value">{healthcareProvider.ProviderId}</p>
                            <p class="data-value">{healthcareProvider.ProviderTIN}</p>
                            <p class="data-value">
                                <a href={phoneTelLink} class="phone-link">{formattedPhoneNumber}</a>
                            </p>
                            <p class="data-value">{healthcareProvider.NPI}</p>
                            <template if:true={isAddressPresent}>
                                <div class="data-value">
                                    <p>{healthcareProvider.ProviderStreet}</p>
                                    <p>{healthcareProvider.ProviderCity}, {healthcareProvider.ProviderState} {healthcareProvider.ProviderZip}</p>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Are you calling on behalf of a Provider? Checkbox -->
                    <div class="slds-grid slds-grid_align-center slds-m-top_medium">
                        <lightning-input type="checkbox"
                                         label="Are you calling on behalf of a Provider?"
                                         checked={isCallingOnBehalf}
                                         onchange={handleIsCallingOnBehalfChange}></lightning-input>
                    </div>

                    <!-- Caller Info + delegation fields — shown after on-behalf checkbox -->
                    <template if:true={isCallingOnBehalf}>
                        <div class="slds-m-around_medium">
                            <lightning-input type="text"
                                            label="Caller Name"
                                            name="callerName"
                                            value={callerName}
                                            required
                                            data-validate
                                            onchange={handleInputChange}></lightning-input>
                            <lightning-combobox name="callerType"
                                                label="Caller Type"
                                                value={callerTypeValue}
                                                options={callerTypeOptions}
                                                onchange={handleCallerTypeChange}></lightning-combobox>
                            <lightning-input type="text"
                                            label="Phone Number"
                                            name="callerPhoneNumber"
                                            value={callerPhoneNumber}
                                            onchange={handleInputChange}></lightning-input>
                            <lightning-input type="text"
                                            label="Phone Extension"
                                            name="phoneExtension"
                                            value={phoneExtension}
                                            onchange={handleInputChange}></lightning-input>
                        </div>
                    </template>
                </template>

                <!-- Error message display -->
                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-around_medium" role="alert">
                        <span>{errorMessage}</span>
                    </div>
                </template>

                <!-- Horizontal divider -->
                <hr class="slds-m-vertical_medium">

                <!-- Action buttons -->
                <div class="slds-grid slds-grid_align-center slds-m-bottom_medium">
                    <lightning-button label="Cancel" variant="brand"
                                      icon-name="utility:close"
                                      onclick={handleCancel}
                                      class="slds-m-right_small">
                    </lightning-button>
                    <lightning-button label={verifyButtonLabel} variant="brand"
                                      icon-name="utility:check"
                                      onclick={verify}
                                      disabled={isSaving}>
                    </lightning-button>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
